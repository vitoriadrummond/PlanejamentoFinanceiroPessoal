<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planejamento Financeiro Pessoal</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">💰 Planejamento</div>

    <button class="nav active" data-page="planejamento">🏠 Planejamento</button>
    <button class="nav" data-page="lancamentos">💰 Lançamentos</button>
    <button class="nav" data-page="recorrencias">🔄 Recorrências</button>
    <button class="nav" data-page="cartoes">💳 Cartões</button>
    <button class="nav" data-page="categorias">🗂️ Categorias</button>
    <button class="nav" data-page="salario">💼 Salário</button>

    <div id="resumoSalarioLateral" class="salary-sidebar-card">
      <div class="salary-sidebar-title">💼 Salário</div>
      <div class="salary-sidebar-month">Mês atual</div>
      <div class="salary-sidebar-label">Salário bruto</div>
      <strong>R$ 0,00</strong>
      <button type="button" class="salary-sidebar-link" onclick="navegar('salario')">Ver histórico</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">Planejamento Financeiro Pessoal</h1>
        <p id="pageSubtitle">Controle de caixa e planejamento dos próximos meses</p>
      </div>

      <div class="topbar-actions">
        <span id="statusConexao" class="status">Conectando...</span>
        <button id="btnAcaoPrincipal" class="btn primary" type="button">+ Novo lançamento</button>
      </div>
    </header>

    <section id="app"></section>
  </main>

  <div id="modal" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modalTitulo">Cadastro</h2>
        <button id="btnFecharModal" class="icon-btn" type="button">×</button>
      </div>
      <div id="modalConteudo"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
 <script src="js/storage.js?v=054"></script>
<script src="js/planejamento.js?v=054"></script>
  <script src="js/lancamentos.js?v=054"></script>
  <script src="js/recorrencias.js?v=054"></script>
  <script src="js/cartoes.js?v=054"></script>
  <script src="js/categorias.js?v=054"></script>
  <script src="js/salario.js?v=054"></script>
 <script src="js/app.js?v=054"></script>
</body>
</html>
